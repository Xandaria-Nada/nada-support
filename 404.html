<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <title>404 – Seite nicht gefunden | NADA</title>

    <meta
      name="description"
      content="Diese Seite konnte leider nicht gefunden werden."
    />

    <meta name="theme-color" content="#080d18" />

    <link
      rel="icon"
      type="image/png"
      href="assets/nada-logo.png"
    />

    <link
      rel="apple-touch-icon"
      href="assets/nada-logo.png"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>

    <header class="header">
      <div class="container nav">

        <a href="index.html" class="brand">

          <img
            src="assets/nada-logo.png"
            alt="NADA Logo"
            class="brand-logo"
          />

          <div>

            <div class="brand-title">
              NADA
            </div>

            <div class="brand-subtitle">
              Cook. Discover. Enjoy.
            </div>

          </div>

        </a>

      </div>
    </header>

    <main>

      <section class="hero">

        <div class="container hero-layout">

          <div class="hero-content">

            <div class="eyebrow">

              <span
                class="eyebrow-dot"
                aria-hidden="true"
              ></span>

              Seite nicht gefunden

            </div>

            <h1 class="hero-title">

              Ups...

              <span class="accent">
                Nada konnte diese Seite nicht finden.
              </span>

            </h1>

            <p class="hero-text">

              Die Seite existiert möglicherweise nicht mehr,
              wurde verschoben oder die Adresse ist nicht korrekt.

            </p>

            <div class="hero-actions">

              <a
                href="index.html"
                class="btn btn-primary"
              >
                Zur Startseite
              </a>

              <a
                href="support.html"
                class="btn btn-secondary"
              >
                Support
              </a>

            </div>

          </div>

          <div class="hero-visual">

            <div class="hero-orb"></div>

            <img
              src="assets/nada-logo.png"
              alt="Nada Maskottchen"
              class="hero-mascot"
            />

          </div>

        </div>

      </section>

    </main>

  </body>
</html>
